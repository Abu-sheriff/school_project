<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - Smart Lecture Notes Repository</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="w-full bg-white dark:bg-slate-900 border-b border-primary/10 px-6 lg:px-10 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="text-primary">
                <svg class="size-8" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z" fill="currentColor"></path>
                </svg>
            </div>
            <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Smart Lecture Notes</h2>
        </div>
        <div class="flex items-center gap-4">
            <a href="/index.html" class="text-sm font-medium hover:text-primary">Home</a>
            <a href="/register.html" class="text-sm font-medium hover:text-primary">Register</a>
        </div>
    </div>
</header>
<main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-[480px] bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-primary/5 border border-primary/10 overflow-hidden">
        <div class="p-8 pb-4 text-center">
            <h1 class="text-slate-900 dark:text-slate-100 text-3xl font-black leading-tight tracking-tight mb-2">Student Login</h1>
            <p class="text-slate-500 dark:text-slate-400 text-base font-normal">Access your lecture notes and study materials</p>
        </div>
        <form id="loginForm" class="p-8 pt-4 flex flex-col gap-6">
            <div class="flex flex-col gap-2">
                <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Email or Matric Number</label>
                <div class="relative flex items-center">
                    <input id="loginId" class="w-full h-14 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg pl-4 pr-12 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="Email or Matric Number" type="text"/>
                    <div class="absolute right-4 text-slate-400">
                        <span class="material-symbols-outlined" data-icon="person">person</span>
                    </div>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <div class="flex justify-between items-center ml-1">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
                </div>
                <div class="relative flex items-center">
                    <input id="loginPassword" class="w-full h-14 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg pl-4 pr-12 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="Enter your password" type="password"/>
                    <div class="absolute right-4 text-slate-400">
                        <span class="material-symbols-outlined" data-icon="lock">lock</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2 ml-1">
                <input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary/50" id="remember" type="checkbox"/>
                <label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Remember this device</label>
            </div>
            <button class="w-full h-14 bg-primary hover:bg-primary/90 text-white text-lg font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-2" type="submit">
                <span>Login</span>
                <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
            </button>
            <div class="text-center mt-4">
                <p class="text-slate-600 dark:text-slate-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline transition-all" href="/register.html">Register here</a>
                </p>
            </div>
        </form>
        <div class="h-1.5 w-full bg-gradient-to-r from-primary/20 via-primary to-primary/20"></div>
    </div>
</main>
<footer class="py-8 px-6 text-center text-slate-400 text-xs">
    <p>© 2024 Smart Lecture Notes Repository. All rights reserved.</p>
</footer>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    let loginId = document.getElementById("loginId").value.trim();
    let password = document.getElementById("loginPassword").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => 
        (u.email === loginId || u.matric === loginId) && u.password === password
    );

    if(!user){
        alert("Invalid login credentials");
        return;
    }

    localStorage.setItem("currentUser", JSON.stringify(user));
    alert("Login successful");
    window.location.href = "/dashboard.html";
});
</script>
</body>
</html>
